server {
    listen 80;
    server_name localhost;

    # Serve frontend dashboard
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Serve static stock reports (latest index.html and archives)
    # Ensure cache-control is off so new reports display immediately
    location /reports/ {
        alias /usr/share/nginx/html/reports/;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Proxy API calls to the FastAPI backend container
    location /api/ {
        proxy_pass http://backend-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
