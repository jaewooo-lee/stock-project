version: '3.8'\n\nservices:
  backend-api:
    build: ./backend
    container_name: stock-backend-api
    restart: always
    volumes:
      - db-volume:/app/data
      - shared-reports:/app/reports
    env_file:
      - .env
    environment:
      - DATABASE_FILE=/app/data/stock_tracker.db
      - REPORTS_DIR=/app/reports

  web-server:
    image: nginx:alpine
    container_name: stock-web-server
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - shared-reports:/usr/share/nginx/html/reports
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-api

volumes:
  db-volume:
  shared-reports:
